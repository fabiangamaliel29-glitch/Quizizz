<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Sensor Kejujuran</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #090d16;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 24px;
            padding: 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .progress-bar {
            font-size: 14px;
            color: #10b981;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 20px;
            color: #f3f4f6;
            margin-bottom: 25px;
            line-height: 1.5;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-container {
            position: relative;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* Tombol IYA */
        .btn-yes {
            background-color: #10b981;
            color: white;
            transition: background 0.2s;
        }

        .btn-yes:hover {
            background-color: #059669;
        }

        /* Tombol TIDAK yang bakal berubah jadi BATAL dan kabur */
        .btn-no {
            background-color: #ef4444;
            color: white;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 10;
            transition: all 0.12s ease-out;
        }

        /* Layar Hasil Akhir (Zonk) */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 13, 22, 0.98);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 24px;
            text-align: center;
        }

        .overlay h2 {
            font-size: 28px;
            color: #ef4444;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .overlay p {
            font-size: 16px;
            color: #d1d5db;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .summary-box {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            font-size: 13px;
            max-width: 360px;
            color: #a1a1aa;
            max-height: 220px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div class="progress-bar" id="quiz-progress">PERTANYAAN 1 / 10</div>
        <h1 id="question-text">Loading pertanyaan...</h1>
        
        <div class="btn-container" id="btn-area">
            <button class="btn btn-yes" onclick="jawabIya()">IYA</button>
            <button class="btn btn-no" id="ghost-btn">TIDAK</button>
        </div>
    </div>

    <!-- Hasil Akhir: Rekapan Pengakuan Dosa -->
    <div class="overlay" id="prank-screen">
        <h2>HASIL DETEKSI: 100% JUJUR! 📝</h2>
        <p>Terima kasih telah menyelesaikan kuis ini dengan jujur. Berikut adalah data asli pengakuan kamu:</p>
        
        <div class="summary-box" id="summary-list">
            <!-- Hasil jawaban iya semua bakal muncul di sini -->
        </div>

        <p style="font-weight: bold; color: #38bdf8;">Silakan SCREENSHOT halaman ini sekarang sebagai bukti fisik! 😂</p>
        <button class="btn btn-yes" style="margin-top: 25px; max-width: 200px;" onclick="location.reload()">Reset Kuis</button>
    </div>

    <script>
        // Daftar 10 pertanyaan titipan kamu
        const daftarPertanyaan = [
            "Apakah kamu suka sama jomok?",
            "Apakah kamu gooners sejati?",
            "JMK67 adalah grup musik kesukaanku?",
            "Aku gooning tadi pagi?",
            "Aku suka anak tk?",
            "Presiden kesukaanku I.r. Soeamba?",
            "Aku lebih milih femboy daripada tomboy?",
            "Aku suka yang berbulu?",
            "Youtuber kesukaanku Reza Auditore?",
            "Aku suka Rainbow Ruby?"
        ];

        let indexSekarang = 0;

        const questionText = document.getElementById('question-text');
        const quizProgress = document.getElementById('quiz-progress');
        const ghostBtn = document.getElementById('ghost-btn');
        const btnArea = document.getElementById('btn-area');
        const mainCard = document.getElementById('main-card');
        const prankScreen = document.getElementById('prank-screen');
        const summaryList = document.getElementById('summary-list');

        // Fungsi menampilkan pertanyaan sesuai urutan
        function tampilkanPertanyaan() {
            if (indexSekarang < daftarPertanyaan.length) {
                quizProgress.textContent = `PERTANYAAN ${indexSekarang + 1} / ${daftarPertanyaan.length}`;
                questionText.textContent = `"${daftarPertanyaan[indexSekarang]}"`;
                
                // Kembalikan tombol ke posisi semula dan tulisan asal tiap ganti soal
                ghostBtn.style.position = 'absolute';
                ghostBtn.style.left = '0px';
                ghostBtn.style.top = '';
                ghostBtn.style.bottom = '0px';
                ghostBtn.textContent = "TIDAK";
            } else {
                akhiriPrank();
            }
        }

        // Logika tombol lari + berubah tulisan jadi BATAL
        function kabur() {
            ghostBtn.textContent = "BATAL"; // Otomatis berubah jadi BATAL saat didekati

            const areaWidth = btnArea.clientWidth;
            const areaHeight = mainCard.clientHeight - 160; 

            const randomX = Math.floor(Math.random() * (areaWidth - ghostBtn.offsetWidth));
            const randomY = Math.floor(Math.random() * (areaHeight - ghostBtn.offsetHeight)) - 35; 

            ghostBtn.style.left = `${randomX}px`;
            ghostBtn.style.top = `${randomY}px`;
        }

        ghostBtn.addEventListener('mouseenter', kabur);
        ghostBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            kabur();
        });

        // Ketika terpaksa nge-klik tombol IYA
        function jawabIya() {
            indexSekarang++;
            tampilkanPertanyaan();
        }

        // Layar akhir rekapan jebakan
        function akhiriPrank() {
            let htmlHasil = "";
            daftarPertanyaan.forEach((soal, i) => {
                htmlHasil += `<p style="margin-bottom:8px;">${i+1}. ${soal} <br><span style="color:#10b981; font-weight:bold;">👉 Jawaban: IYA</span></p>`;
            });
            summaryList.innerHTML = htmlHasil;
            prankScreen.style.display = 'flex';
        }

        // Mulai kuis pertama kali
        tampilkanPertanyaan();
    </script>
</body>
</html>
